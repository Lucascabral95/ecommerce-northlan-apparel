name: northlane-apparel

services:
  postgres:
    image: postgres:16-alpine
    container_name: northlane-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-northlane}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-northlane}
      POSTGRES_DB: ${POSTGRES_DB:-northlane_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-northlane} -d ${POSTGRES_DB:-northlane_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - northlane

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: northlane-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-northlane}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-northlane}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - northlane

  redis:
    image: redis:7.4-alpine
    container_name: northlane-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - northlane

  api-gateway:
    build:
      context: .
      dockerfile: infra/docker/node-service.Dockerfile
      args:
        WORKSPACE_NAME: "@northlane/api-gateway"
    container_name: northlane-api-gateway
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 4000
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-northlane}:${RABBITMQ_DEFAULT_PASS:-northlane}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=api_gateway
      API_CORS_ORIGIN: ${API_CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${API_GATEWAY_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - northlane

  base-service:
    build:
      context: .
      dockerfile: infra/docker/node-service.Dockerfile
      args:
        WORKSPACE_NAME: "@northlane/base-service"
    container_name: northlane-base-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 3001
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-northlane}:${RABBITMQ_DEFAULT_PASS:-northlane}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=base_service
    ports:
      - "${BASE_SERVICE_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - northlane

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: northlane-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api-gateway
      - base-service
    networks:
      - northlane

  grafana:
    image: grafana/grafana:11.4.0
    container_name: northlane-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - northlane

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  northlane:
    driver: bridge
