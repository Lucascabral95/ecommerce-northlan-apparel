name: northlane-apparel

x-node-service: &node-service
  networks:
    - northlane
  restart: unless-stopped

x-backend-service: &backend-service
  <<: *node-service
  image: northlane-apparel-backend:local

x-platform-env: &platform-env
  NODE_ENV: ${NODE_ENV:-production}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-replace-with-a-strong-local-secret}
  JWT_ACCESS_EXPIRES_IN_SECONDS: ${JWT_ACCESS_EXPIRES_IN_SECONDS:-900}
  JWT_REFRESH_TOKEN_EXPIRES_IN_DAYS: ${JWT_REFRESH_TOKEN_EXPIRES_IN_DAYS:-30}
  BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
  API_CORS_ORIGIN: ${API_CORS_ORIGIN:-http://localhost:3000}
  API_RATE_LIMIT_TTL_MS: ${API_RATE_LIMIT_TTL_MS:-60000}
  API_RATE_LIMIT_LIMIT: ${API_RATE_LIMIT_LIMIT:-100}
  INVENTORY_RESERVATION_TTL_SECONDS: ${INVENTORY_RESERVATION_TTL_SECONDS:-900}
  PAYMENT_PROVIDER_MODE: ${PAYMENT_PROVIDER_MODE:-MOCK}
  PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-MOCK}
  PAYMENT_MOCK_FAILURE_AMOUNT: ${PAYMENT_MOCK_FAILURE_AMOUNT:-13.37}
  PAYMENT_MOCK_FORCE_FAILURE: ${PAYMENT_MOCK_FORCE_FAILURE:-false}
  FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
  API_GATEWAY_BASE_URL: ${API_GATEWAY_BASE_URL:-http://localhost:4000/api/v1}
  MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN:-}
  MERCADO_PAGO_PUBLIC_KEY: ${MERCADO_PAGO_PUBLIC_KEY:-}
  MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET:-}
  MERCADO_PAGO_WEBHOOK_URL: ${MERCADO_PAGO_WEBHOOK_URL:-}
  MERCADO_PAGO_SUCCESS_URL: ${MERCADO_PAGO_SUCCESS_URL:-http://localhost:3000/es/payment/success}
  MERCADO_PAGO_FAILURE_URL: ${MERCADO_PAGO_FAILURE_URL:-http://localhost:3000/es/payment/failure}
  MERCADO_PAGO_PENDING_URL: ${MERCADO_PAGO_PENDING_URL:-http://localhost:3000/es/payment/pending}
  MERCADO_PAGO_NOTIFICATION_URL: ${MERCADO_PAGO_NOTIFICATION_URL:-}
  RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-northlane}:${RABBITMQ_DEFAULT_PASS:-northlane}@rabbitmq:5672
  REDIS_URL: redis://redis:6379

services:
  rabbitmq:
    <<: *node-service
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-northlane}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-northlane}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
      - "${RABBITMQ_METRICS_PORT:-15692}:15692"
    volumes:
      - ./infra/docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    <<: *node-service
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-northlane}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-northlane}
      POSTGRES_DB: ${POSTGRES_DB:-northlane_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-northlane} -d ${POSTGRES_DB:-northlane_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    <<: *node-service
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.2.1
    command: ["-config.file=/etc/loki/loki-config.yml"]
    networks:
      - northlane
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./infra/docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  alloy:
    image: grafana/alloy:v1.5.1
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    networks:
      - northlane
    ports:
      - "${ALLOY_PORT:-12345}:12345"
    volumes:
      - ./infra/docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    networks:
      - northlane
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.3.1
    networks:
      - northlane
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-runtime:
    profiles: ["build"]
    image: northlane-apparel-backend:local
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    command: ["node", "--version"]
    networks:
      - northlane

  bootstrap:
    profiles: ["bootstrap"]
    image: northlane-apparel-bootstrap:local
    networks:
      - northlane
    restart: "no"
    build:
      context: .
      dockerfile: infra/docker/bootstrap.Dockerfile
    environment:
      <<: *platform-env
      AUTH_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=auth_service
      USER_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=user_service
      CATALOG_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=catalog_service
      INVENTORY_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=inventory_service
      CART_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=cart_service
      ORDER_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=order_service
      PAYMENT_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=payment_service
      NOTIFICATION_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=notification_service
    depends_on:
      postgres:
        condition: service_healthy

  auth-service:
    <<: *backend-service
    command: ["node", "services/auth-service/dist/main.js"]
    environment:
      <<: *platform-env
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT:-4101}
      AUTH_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=auth_service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${AUTH_SERVICE_PORT:-4101}:${AUTH_SERVICE_PORT:-4101}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + process.env.AUTH_SERVICE_PORT + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  user-service:
    <<: *backend-service
    command: ["node", "services/user-service/dist/main.js"]
    environment:
      <<: *platform-env
      USER_SERVICE_PORT: ${USER_SERVICE_PORT:-4102}
      USER_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=user_service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${USER_SERVICE_PORT:-4102}:${USER_SERVICE_PORT:-4102}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + process.env.USER_SERVICE_PORT + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  catalog-service:
    <<: *backend-service
    command: ["node", "services/catalog-service/dist/main.js"]
    environment:
      <<: *platform-env
      CATALOG_SERVICE_PORT: ${CATALOG_SERVICE_PORT:-4103}
      CATALOG_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=catalog_service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${CATALOG_SERVICE_PORT:-4103}:${CATALOG_SERVICE_PORT:-4103}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + process.env.CATALOG_SERVICE_PORT + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  inventory-service:
    <<: *backend-service
    command: ["node", "services/inventory-service/dist/main.js"]
    environment:
      <<: *platform-env
      INVENTORY_SERVICE_PORT: ${INVENTORY_SERVICE_PORT:-4104}
      INVENTORY_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=inventory_service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${INVENTORY_SERVICE_PORT:-4104}:${INVENTORY_SERVICE_PORT:-4104}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + process.env.INVENTORY_SERVICE_PORT + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  cart-service:
    <<: *backend-service
    command: ["node", "services/cart-service/dist/main.js"]
    environment:
      <<: *platform-env
      CART_SERVICE_PORT: ${CART_SERVICE_PORT:-4105}
      CART_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=cart_service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${CART_SERVICE_PORT:-4105}:${CART_SERVICE_PORT:-4105}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + process.env.CART_SERVICE_PORT + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  order-service:
    <<: *backend-service
    command: ["node", "services/order-service/dist/main.js"]
    environment:
      <<: *platform-env
      ORDER_SERVICE_PORT: ${ORDER_SERVICE_PORT:-4106}
      ORDER_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=order_service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${ORDER_SERVICE_PORT:-4106}:${ORDER_SERVICE_PORT:-4106}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + process.env.ORDER_SERVICE_PORT + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  payment-service:
    <<: *backend-service
    command: ["node", "services/payment-service/dist/main.js"]
    environment:
      <<: *platform-env
      PAYMENT_SERVICE_PORT: ${PAYMENT_SERVICE_PORT:-4107}
      PAYMENT_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=payment_service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${PAYMENT_SERVICE_PORT:-4107}:${PAYMENT_SERVICE_PORT:-4107}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + process.env.PAYMENT_SERVICE_PORT + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  notification-service:
    <<: *backend-service
    command: ["node", "services/notification-service/dist/main.js"]
    environment:
      <<: *platform-env
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT:-4108}
      NOTIFICATION_DATABASE_URL: postgresql://${POSTGRES_USER:-northlane}:${POSTGRES_PASSWORD:-northlane}@postgres:5432/${POSTGRES_DB:-northlane_platform}?schema=notification_service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-4108}:${NOTIFICATION_SERVICE_PORT:-4108}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + process.env.NOTIFICATION_SERVICE_PORT + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api-gateway:
    <<: *backend-service
    command: ["node", "apps/api-gateway/dist/main.js"]
    environment:
      <<: *platform-env
      API_GATEWAY_PORT: ${API_GATEWAY_PORT:-4000}
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${API_GATEWAY_PORT:-4000}:${API_GATEWAY_PORT:-4000}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + process.env.API_GATEWAY_PORT + '/api/v1/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  web:
    <<: *node-service
    image: northlane-apparel-web:local
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_GATEWAY_URL: ${NEXT_PUBLIC_API_GATEWAY_URL:-http://localhost:4000/api/v1}
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_GATEWAY_URL: ${NEXT_PUBLIC_API_GATEWAY_URL:-http://localhost:4000/api/v1}
      INTERNAL_API_GATEWAY_URL: http://api-gateway:${API_GATEWAY_PORT:-4000}/api/v1
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/login').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  rabbitmq_data:
  postgres_data:
  redis_data:
  loki_data:
  prometheus_data:
  grafana_data:

networks:
  northlane:
    driver: bridge
