global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:4000

  - job_name: base-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - base-service:3001
